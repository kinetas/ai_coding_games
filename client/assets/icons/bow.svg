<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Bow limb (curved stave) -->
  <path d="M14 6 Q4 32 14 58" stroke="#8b6520" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Bowstring -->
  <line x1="14" y1="6" x2="14" y2="58" stroke="#e8d5a0" stroke-width="2" stroke-linecap="round"/>
  <!-- String attachment knots -->
  <circle cx="14" cy="6" r="3" fill="#c8a030"/>
  <circle cx="14" cy="58" r="3" fill="#c8a030"/>
  <!-- Nocking point -->
  <circle cx="14" cy="32" r="3" fill="#c8a030"/>
  <!-- Arrow (nocked and ready) -->
  <line x1="14" y1="32" x2="54" y2="32" stroke="#a07030" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="54,27 63,32 54,37" fill="#7a7a8a"/>
  <!-- Fletching -->
  <polygon points="16,26 26,30 26,34 16,38" fill="#c84020"/>
</svg>
