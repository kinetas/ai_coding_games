<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Crossed swords behind skull -->
  <line x1="8" y1="56" x2="56" y2="8" stroke="#8a8a9a" stroke-width="5" stroke-linecap="round"/>
  <line x1="56" y1="56" x2="8" y2="8" stroke="#8a8a9a" stroke-width="5" stroke-linecap="round"/>
  <!-- Sword guards -->
  <rect x="26" y="27" width="12" height="4" rx="2" fill="#c8a030"/>
  <rect x="26" y="33" width="12" height="4" rx="2" fill="#c8a030"/>
  <!-- Skull -->
  <ellipse cx="32" cy="28" rx="17" ry="19" fill="#c8b890"/>
  <!-- Eye sockets -->
  <ellipse cx="23" cy="26" rx="6" ry="7" fill="#2a1a10"/>
  <ellipse cx="41" cy="26" rx="6" ry="7" fill="#2a1a10"/>
  <!-- Red eyes (menacing glow) -->
  <ellipse cx="23" cy="26" rx="3" ry="4" fill="#c02020"/>
  <ellipse cx="41" cy="26" rx="3" ry="4" fill="#c02020"/>
  <!-- Nose cavity -->
  <path d="M30 36 L32 40 L34 36 Q33 34 30 36Z" fill="#2a1a10"/>
  <!-- Teeth -->
  <rect x="23" y="42" width="4" height="6" rx="1" fill="#2a1a10"/>
  <rect x="29" y="42" width="4" height="6" rx="1" fill="#2a1a10"/>
  <rect x="37" y="42" width="4" height="6" rx="1" fill="#2a1a10"/>
  <!-- Skull crack -->
  <path d="M32 12 Q36 18 34 24" stroke="#a09878" stroke-width="1.5" fill="none" opacity="0.6"/>
</svg>
