<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Bow limb -->
  <path d="M10 6 Q2 32 10 58" stroke="#8b6520" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Bowstring -->
  <line x1="10" y1="6" x2="10" y2="58" stroke="#e8d5a0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Arrow shaft -->
  <line x1="10" y1="32" x2="52" y2="32" stroke="#a07030" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="52,27 62,32 52,37" fill="#6a6a7a"/>
  <!-- Fletching -->
  <polygon points="12,26 22,29 22,35 12,38" fill="#c84020"/>
  <!-- Nocking point -->
  <circle cx="10" cy="32" r="3" fill="#c8a030"/>
  <!-- Arm drawing back -->
  <line x1="30" y1="32" x2="40" y2="32" stroke="#5c3312" stroke-width="6" stroke-linecap="round"/>
  <!-- Hand -->
  <circle cx="40" cy="32" r="5" fill="#5c3312"/>
</svg>
