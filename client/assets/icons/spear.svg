<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Shaft -->
  <line x1="6" y1="58" x2="48" y2="12" stroke="#8b6520" stroke-width="6" stroke-linecap="round"/>
  <!-- Butt cap -->
  <circle cx="6" cy="58" r="4" fill="#5c3312"/>
  <!-- Grip wrapping (bands) -->
  <line x1="14" y1="50" x2="20" y2="44" stroke="#5a3a0a" stroke-width="5" stroke-linecap="round"/>
  <line x1="20" y1="56" x2="26" y2="50" stroke="#5a3a0a" stroke-width="5" stroke-linecap="round"/>
  <!-- Spearhead socket -->
  <rect x="42" y="6" width="8" height="14" rx="2" transform="rotate(-47 46 13)" fill="#6a6a7a"/>
  <!-- Spearhead blade -->
  <polygon points="48,10 40,22 56,4" fill="#9a9ab0" stroke="#5a5a6a" stroke-width="1"/>
  <!-- Blade center line -->
  <line x1="52" y1="7" x2="44" y2="17" stroke="#c8c8d8" stroke-width="1" opacity="0.7"/>
</svg>
