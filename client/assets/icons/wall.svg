<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Merlons (battlements) -->
  <rect x="2" y="14" width="13" height="22" rx="2" fill="#7a7060"/>
  <rect x="19" y="14" width="13" height="22" rx="2" fill="#7a7060"/>
  <rect x="36" y="14" width="13" height="22" rx="2" fill="#7a7060"/>
  <rect x="53" y="14" width="9" height="22" rx="2" fill="#7a7060"/>
  <!-- Main wall base -->
  <rect x="2" y="28" width="60" height="28" rx="2" fill="#6a6050"/>
  <!-- Stone course lines -->
  <line x1="2" y1="40" x2="62" y2="40" stroke="#5a5040" stroke-width="1.5" opacity="0.7"/>
  <line x1="2" y1="50" x2="62" y2="50" stroke="#5a5040" stroke-width="1.5" opacity="0.7"/>
  <!-- Vertical joints upper -->
  <line x1="14" y1="28" x2="14" y2="40" stroke="#5a5040" stroke-width="1.5" opacity="0.5"/>
  <line x1="32" y1="28" x2="32" y2="40" stroke="#5a5040" stroke-width="1.5" opacity="0.5"/>
  <line x1="50" y1="28" x2="50" y2="40" stroke="#5a5040" stroke-width="1.5" opacity="0.5"/>
  <!-- Vertical joints lower -->
  <line x1="22" y1="40" x2="22" y2="56" stroke="#5a5040" stroke-width="1.5" opacity="0.5"/>
  <line x1="42" y1="40" x2="42" y2="56" stroke="#5a5040" stroke-width="1.5" opacity="0.5"/>
  <!-- Arrow slit -->
  <rect x="28" y="32" width="4" height="12" rx="1" fill="#3a3028"/>
</svg>
